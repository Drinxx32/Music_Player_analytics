<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" 
    href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Player de Música</title>
</head>

<body>

    <div class="container">

        <img src="imagens/ultima dança.jpg" alt="Capa da música">

        <div class="descricao">
            <h2>Nome da música</h2>
            <i>Nome do artista</i>
        </div>

        <div class="duracao">

            <div class="barra" id="barra">
                <progress value="0" max="1"></progress>
                <div class="ponto"></div>
            </div>

            <div class="tempo">
                <p class="inicio">0:00</p>
                <p class="fim">0:00</p>
            </div>

        </div>

        <div class="player">

            <i class="fas fa-step-backward setas anterior"></i>

            <i class="fas fa-play-circle botao-play"></i>

            <i class="fas fa-pause-circle botao-pause"></i>

            <i class="fas fa-step-forward setas proximo"></i>

        </div>

    </div>

    <audio src="musicas/Ultima dança.mp3"></audio>

    <script src="main.js"></script>

</body>
</html>
